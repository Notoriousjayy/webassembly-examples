# Release workflow for packaged WebAssembly artifacts
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      EMSDK: /tmp/emsdk

    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        shell: bash
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "$EMSDK"
          "$EMSDK/emsdk" install latest
          "$EMSDK/emsdk" activate latest
          source "$EMSDK/emsdk_env.sh"

      - name: Cache Emscripten build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.emscripten_cache
            ${{ env.EMSDK }}/upstream/emscripten/cache
          key: emsdk-${{ runner.os }}-latest

      - name: Build release artifacts
        shell: bash
        run: |
          source "$EMSDK/emsdk_env.sh"
          emcmake cmake --preset wasm-release
          cmake --build --preset wasm-release --parallel 2
          mkdir -p release
          cp build-wasm/index.html release/
          cp build-wasm/index.js release/
          cp build-wasm/index.wasm release/
          if [ -f build-wasm/index.data ]; then cp build-wasm/index.data release/; fi
          cd release && zip -r testProject-wasm.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/testProject-wasm.zip
          body: |
            ## WebAssembly release

            This release contains the optimized `testProject` WebAssembly build.

            Serve the extracted files with any static web server, for example:

            `python3 -m http.server 8000`

            Then open http://localhost:8000 in your browser.

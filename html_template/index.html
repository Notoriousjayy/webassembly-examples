<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>testProject</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #status {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 8px 10px;
      font-size: 14px;
      color: #e6e6e6;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 8px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas" width="1280" height="720"></canvas>
    <div id="status">Loading WebAssembly module…</div>
  </div>

  <script type="module" src="./bootstrap.js"></script>
</body>
</html>
